info:
  title: Project Back API
  description: >-
    Backend API для фронтенда и AI-ассистентов.


    ## Аутентификация


    - После login/register/refresh сервер устанавливает httpOnly cookies:
    `access-token`, `refresh-token`.

    - Все защищённые запросы требуют cookie `access-token`.

    - Фронт должен отправлять запросы с `credentials: 'include'` (fetch/axios).


    ## Сброс пароля


    1. `POST /auth/recovery-password` с `{ email }` — всегда возвращает успех
    (защита от перебора email).

    2. Письмо отправляется только если email существует в БД.

    3. Ссылка в письме: `{FRONTEND_URL}/reset-password?token={jwt}`.

    4. Фронт читает `token` из query-параметра URL.

    5. `POST /auth/reset-password` с `{ token, newPassword }`.


    ## CORS


    - Origin фронта задаётся через `CORS_ORIGIN` (по умолчанию
    http://localhost:3000).

    - `credentials: true` — cookies передаются cross-origin.


    ## Чат (WebSocket)


    - Namespace: `/chat` (Socket.IO), URL: `http://localhost:3010/chat`.

    - Подключение с `withCredentials: true` (cookie `access-token`) или `auth: {
    token: accessToken }`.

    - События клиент → сервер:
      - `join_conversation` — `{ conversationId }`
      - `send_message` — `{ conversationId, content }`
    - События сервер → клиент:
      - `message` — `{ id, conversationId, senderId, content, createdAt }`
      - `error` — `{ message }`
    - REST для списка диалогов и истории: `/chat/conversations`,
    `/chat/conversations/:id/messages`.

    - Диалоги только между creator и company (1:1).
  version: "1.0"
  contact: {}
tags: []
servers:
  - url: http://localhost:3010
    description: Local dev
components:
  securitySchemes:
    cookie:
      type: apiKey
      in: cookie
      name: access-token
  schemas:
    RegisterCreatorDto:
      type: object
      properties:
        phone:
          type: string
          example: "+79991234567"
        location:
          type: string
          example: Moscow
        avatar:
          type: string
          example: https://example.com/avatar.png
        bio:
          type: string
          example: Short bio
        aboutMe:
          type: string
          example: More about me
        email:
          type: string
          example: creator@example.com
        password:
          type: string
          example: password123
          minLength: 8
        name:
          type: string
          example: John
        lastName:
          type: string
          example: Doe
      required:
        - email
        - password
        - name
        - lastName
    RegisterCompanyDto:
      type: object
      properties:
        phone:
          type: string
          example: "+79991234567"
        location:
          type: string
          example: Moscow
        avatar:
          type: string
          example: https://example.com/avatar.png
        bio:
          type: string
          example: Short bio
        aboutMe:
          type: string
          example: More about me
        email:
          type: string
          example: company@example.com
        password:
          type: string
          example: password123
          minLength: 8
        companyName:
          type: string
          example: Acme Inc.
      required:
        - email
        - password
        - companyName
    LoginDto:
      type: object
      properties:
        email:
          type: string
          example: user@example.com
        password:
          type: string
          example: password123
      required:
        - email
        - password
    RequestPasswordResetDto:
      type: object
      properties:
        email:
          type: string
          example: user@example.com
      required:
        - email
    ResetPasswordDto:
      type: object
      properties:
        token:
          type: string
          description: Token from reset-password email link
        newPassword:
          type: string
          example: newPassword123
          minLength: 8
      required:
        - token
        - newPassword
    ChatPeerResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        role:
          type: string
          enum:
            - CREATOR
            - COMPANY
          example: CREATOR
        avatar:
          type: string
          nullable: true
          example: https://example.com/avatar.png
        displayName:
          type: string
          example: John Doe
      required:
        - id
        - role
        - avatar
        - displayName
    ChatMessageResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        conversationId:
          type: string
          format: uuid
        senderId:
          type: string
          format: uuid
        content:
          type: string
          example: Hello!
        createdAt:
          format: date-time
          type: string
      required:
        - id
        - conversationId
        - senderId
        - content
        - createdAt
    ChatConversationResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        peer:
          $ref: "#/components/schemas/ChatPeerResponse"
        lastMessage:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/ChatMessageResponse"
        updatedAt:
          format: date-time
          type: string
      required:
        - id
        - peer
        - lastMessage
        - updatedAt
    CreateConversationDto:
      type: object
      properties:
        recipientId:
          type: string
          format: uuid
          description: User id of the chat recipient
      required:
        - recipientId
    UpdateCreatorProfileDto:
      type: object
      properties:
        phone:
          type: string
          example: "+79991234567"
        location:
          type: string
          example: Moscow
        avatar:
          type: string
          example: https://example.com/avatar.png
        bio:
          type: string
          example: Short bio
        aboutMe:
          type: string
          example: More about me
        name:
          type: string
          example: John
        lastName:
          type: string
          example: Doe
    UpdateCompanyProfileDto:
      type: object
      properties:
        phone:
          type: string
          example: "+79991234567"
        location:
          type: string
          example: Moscow
        avatar:
          type: string
          example: https://example.com/avatar.png
        bio:
          type: string
          example: Short bio
        aboutMe:
          type: string
          example: More about me
        companyName:
          type: string
          example: Acme Inc.
